<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F0E8" />
      <stop offset="100%" style="stop-color:#EDE8DD" />
    </linearGradient>
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8B2500" />
      <stop offset="50%" style="stop-color:#C68B2C" />
      <stop offset="100%" style="stop-color:#A67C52" />
    </linearGradient>
    <linearGradient id="pigeonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B6560" />
      <stop offset="100%" style="stop-color:#4A4540" />
    </linearGradient>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A7A6D" />
      <stop offset="100%" style="stop-color:#156B60" />
    </linearGradient>
    <linearGradient id="bodyLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9C9590" />
      <stop offset="100%" style="stop-color:#6B6560" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="fireGlow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2C2825" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background circle — parchment -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGrad)" stroke="#D4CFC6" stroke-width="3"/>
  
  <!-- Subtle inner ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#E5DFD3" stroke-width="1"/>
  
  <!-- Fire base (behind pigeon) -->
  <g filter="url(#fireGlow)" opacity="0.85">
    <!-- Main flame -->
    <path d="M200 410 Q220 330 240 300 Q250 270 256 240 Q262 270 272 300 Q292 330 312 410 Q256 380 200 410Z" fill="url(#fireGrad)" opacity="0.8"/>
    <!-- Left flame -->
    <path d="M180 410 Q195 360 210 330 Q220 300 230 280 Q225 320 215 350 Q200 380 180 410Z" fill="#8B2500" opacity="0.5"/>
    <!-- Right flame -->
    <path d="M332 410 Q317 360 302 330 Q292 300 282 280 Q287 320 297 350 Q312 380 332 410Z" fill="#8B2500" opacity="0.5"/>
    <!-- Inner bright flame -->
    <path d="M225 410 Q240 360 250 330 Q256 300 256 280 Q256 300 262 330 Q272 360 287 410 Q256 390 225 410Z" fill="#C68B2C" opacity="0.7"/>
    <!-- Core glow -->
    <path d="M240 410 Q248 375 254 350 Q256 330 256 320 Q256 330 258 350 Q264 375 272 410 Q256 400 240 410Z" fill="#A67C52" opacity="0.5"/>
  </g>
  
  <!-- Pigeon body -->
  <g transform="translate(256, 225)" filter="url(#softShadow)">
    <!-- Body -->
    <ellipse cx="0" cy="40" rx="62" ry="72" fill="url(#bodyLight)"/>
    
    <!-- Left wing -->
    <path d="M-18 12 Q-75 -25 -115 -5 Q-95 22 -55 42 Q-35 50 -18 52Z" fill="url(#wingGrad)" opacity="0.9"/>
    <!-- Wing feather lines -->
    <path d="M-22 22 Q-65 0 -95 8" fill="none" stroke="#1A7A6D" stroke-width="1.5" opacity="0.4"/>
    <path d="M-20 32 Q-55 15 -85 20" fill="none" stroke="#1A7A6D" stroke-width="1" opacity="0.3"/>
    
    <!-- Right wing -->
    <path d="M18 12 Q75 -25 115 -5 Q95 22 55 42 Q35 50 18 52Z" fill="url(#wingGrad)" opacity="0.9"/>
    <!-- Wing feather lines -->
    <path d="M22 22 Q65 0 95 8" fill="none" stroke="#1A7A6D" stroke-width="1.5" opacity="0.4"/>
    <path d="M20 32 Q55 15 85 20" fill="none" stroke="#1A7A6D" stroke-width="1" opacity="0.3"/>
    
    <!-- Head -->
    <circle cx="0" cy="-28" r="34" fill="url(#pigeonGrad)"/>
    
    <!-- Eye left -->
    <circle cx="-11" cy="-33" r="7.5" fill="#F5F0E8"/>
    <circle cx="-11" cy="-33" r="5" fill="#2C2825"/>
    <circle cx="-9" cy="-35" r="2" fill="#F5F0E8"/>
    
    <!-- Eye right -->
    <circle cx="11" cy="-33" r="7.5" fill="#F5F0E8"/>
    <circle cx="11" cy="-33" r="5" fill="#2C2825"/>
    <circle cx="13" cy="-35" r="2" fill="#F5F0E8"/>
    
    <!-- Beak -->
    <path d="M-5 -20 L0 -10 L5 -20Z" fill="#C68B2C"/>
    <path d="M-3 -20 L0 -13 L3 -20Z" fill="#A67C52" opacity="0.5"/>
    
    <!-- Chest shimmer — crimson/bronze iridescence -->
    <ellipse cx="0" cy="18" rx="28" ry="22" fill="#8B2500" opacity="0.12"/>
    <ellipse cx="0" cy="22" rx="18" ry="15" fill="#A67C52" opacity="0.1"/>
    
    <!-- Belly highlight -->
    <ellipse cx="0" cy="45" rx="25" ry="20" fill="#B8B2A6" opacity="0.3"/>
    
    <!-- Tail feathers -->
    <path d="M-18 98 L-28 128 L-8 112Z" fill="#6B6560" opacity="0.7"/>
    <path d="M0 102 L0 135 L14 118Z" fill="#6B6560" opacity="0.6"/>
    <path d="M18 98 L28 128 L8 112Z" fill="#6B6560" opacity="0.7"/>
    
    <!-- Feet -->
    <path d="M-14 108 L-18 126 M-18 126 L-26 130 M-18 126 L-16 134 M-18 126 L-10 132" stroke="#C68B2C" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M14 108 L18 126 M18 126 L26 130 M18 126 L16 134 M18 126 L10 132" stroke="#C68B2C" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </g>
  
  <!-- Fire sparks -->
  <g filter="url(#glow)">
    <circle cx="222" cy="295" r="2.5" fill="#C68B2C" opacity="0.7"/>
    <circle cx="288" cy="305" r="2" fill="#A67C52" opacity="0.6"/>
    <circle cx="242" cy="275" r="1.5" fill="#8B2500" opacity="0.5"/>
    <circle cx="272" cy="285" r="1.5" fill="#C68B2C" opacity="0.6"/>
    <circle cx="205" cy="325" r="1.5" fill="#8B2500" opacity="0.4"/>
    <circle cx="308" cy="320" r="1.5" fill="#A67C52" opacity="0.4"/>
  </g>
</svg>